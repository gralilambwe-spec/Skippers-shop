// Each icon accepts { size = 24, className = "", color = "currentColor" } like lucide-react.
const { createElement: h } = React;

function makeIcon(paths) {
  return function Icon({ size = 24, className = "", color = "currentColor", ...rest }) {
    return h(
      "svg",
      {
        width: size,
        height: size,
        viewBox: "0 0 24 24",
        fill: "none",
        stroke: color,
        strokeWidth: 2,
        strokeLinecap: "round",
        strokeLinejoin: "round",
        className,
        ...rest,
      },
      paths.map((p, i) => h(p.tag, { key: i, ...p.attrs }))
    );
  };
}

// ---------- Persistent storage (browser localStorage — survives reload on this device/browser) ----------
async function loadListings() {
  try {
    const raw = localStorage.getItem("skippers_listings");
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return seedListings();
}

async function saveListings(listings) {
  try {
    localStorage.setItem("skippers_listings", JSON.stringify(listings));
  } catch (e) {
    console.error("Failed to save listings", e);
  }
}

async function loadShop() {
  try {
    const raw = localStorage.getItem("skippers_shop_config");
    if (raw) return { ...DEFAULT_SHOP, ...JSON.parse(raw) };
  } catch (e) {}
  return DEFAULT_SHOP;
}

async function saveShop(shop) {
  try {
    localStorage.setItem("skippers_shop_config", JSON.stringify(shop));
  } catch (e) {
    console.error("Failed to save shop config", e);
  }
}

function formatMWK(n) {
  return "MWK " + n.toLocaleString("en-US");
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const hrs = Math.floor(diff / 3600000);
  if (hrs < 1) return "just now";
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function Pill({ children, tone = "default" }) {
  const tones = {
    default: "bg-[#15233A] text-[#9FB3CC] border-[#22344F]",
    live: "bg-[#0E2A2E] text-[#3DD6F5] border-[#1C4A52]",
    pending: "bg-[#2A2310] text-[#F5A623] border-[#4A3C18]",
    shop: "bg-[#0E2A2E] text-[#3DD6F5] border-[#1C4A52]",
  };
  return (
    <span className={`font-mono text-[10px] uppercase tracking-wider px-2 py-1 rounded border ${tones[tone]}`}>
      {children}
    </span>
  );
}

// ---------- Listing Card ----------
function ListingCard({ listing, onOpen, isWatching }) {
  return (
    <button
      onClick={() => onOpen(listing)}
      className="group relative text-left rounded-lg bg-[#0F1B2D] border border-[#1C2C42] p-4 flex flex-col gap-3 overflow-hidden transition-all duration-300 hover:border-[#3DD6F5]/60 hover:-translate-y-0.5"
    >
      {/* circuit trace accent */}
      <div className="absolute top-0 left-4 w-px h-3 bg-[#3DD6F5]/0 group-hover:bg-[#3DD6F5]/70 transition-colors duration-300" />
      <div className="absolute top-0 right-4 w-px h-3 bg-[#3DD6F5]/0 group-hover:bg-[#3DD6F5]/70 transition-colors duration-300" />

      {isWatching && (
        <div className="absolute top-3 right-3 w-6 h-6 rounded-full bg-[#3DD6F5]/15 border border-[#3DD6F5]/40 flex items-center justify-center">
          <Eye size={12} className="text-[#3DD6F5]" />
        </div>
      )}

      <div className="flex items-start justify-between gap-2">
        <div className="w-12 h-12 rounded-md bg-[#0B1220] border border-[#22344F] flex items-center justify-center flex-shrink-0">
          {listing.category === "Repair" ? (

        <span className="font-mono text-[10px] text-[#7C8BA0]">{timeAgo(listing.createdAt)}</span>

// ---------- Submit Listing Form ----------
function SubmitListingForm({ onSubmit, onCancel }) {
  const [form, setForm] = useState({
    title: "", category: "Phones", price: "", seller: "", condition: "Used — Good", desc: "",
  });
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

  const valid = form.title.trim() && form.price && form.seller.trim();

  return (
    <div className="max-w-lg mx-auto px-4 py-6">
      <button onClick={onCancel} className="flex items-center gap-1.5 text-[#7C8BA0] hover:text-[#3DD6F5] text-sm mb-6 transition-colors">
        <ArrowLeft size={16} /> Cancel
      </button>

      <h1 className="font-sans text-lg font-semibold text-[#E8EEF5] mb-1">List something for sale</h1>
      <p className="text-sm text-[#7C8BA0] mb-6">
        Skippers reviews every listing before it goes live. A {Math.round(COMMISSION_RATE * 100)}% commission applies on sale.
      </p>

      <div className="space-y-4">
        <Field label="Your name">
          <input value={form.seller} onChange={set("seller")} placeholder="e.g. Chimwemwe Banda"
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] placeholder:text-[#4D5C73] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </Field>
        <Field label="Item title">
          <input value={form.title} onChange={set("title")} placeholder="e.g. iPhone XR — Used, Grade B"
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] placeholder:text-[#4D5C73] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Category">
            <select value={form.category} onChange={set("category")}
              className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]">
              {CATEGORIES.filter((c) => c !== "All").map((c) => <option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Condition">
            <select value={form.condition} onChange={set("condition")}
              className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]">
              {["New", "Used — Excellent", "Used — Good", "Used — Fair", "For parts"].map((c) => <option key={c}>{c}</option>)}
            </select>
          </Field>
        </div>
        <Field label="Price (MWK)">
          <input value={form.price} onChange={set("price")} type="number" placeholder="e.g. 95000"
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] placeholder:text-[#4D5C73] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </Field>
        <Field label="Description">
          <textarea value={form.desc} onChange={set("desc")} rows={3} placeholder="Condition details, accessories included, reason for selling..."
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2.5 text-sm text-[#E8EEF5] placeholder:text-[#4D5C73] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5] resize-none" />
        </Field>

        {form.price && (
          <div className="rounded-md bg-[#0B1220] border border-[#22344F] px-3 py-2.5 flex items-center justify-between text-xs">
            <span className="text-[#7C8BA0]">You'd receive (after commission)</span>
            <span className="font-mono text-[#3DD6F5]">
              {formatMWK(Math.round(Number(form.price) * (1 - COMMISSION_RATE)))}
            </span>
          </div>
        )}

        <button
          disabled={!valid}
          onClick={() => onSubmit(form)}
          className="w-full rounded-lg bg-[#3DD6F5] text-[#0B1220] font-medium text-sm py-3 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-[#5FE0F8] transition-colors mt-2"
        >
          Submit for review
        </button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-1.5">{label}</span>
      {children}
    </label>
  );
}

// ---------- Admin Panel ----------
function ShopSettingsEditor({ shop, onUpdateShop }) {
  const [draft, setDraft] = useState(shop);
  const [saved, setSaved] = useState(false);

  useEffect(() => { setDraft(shop); }, [shop]);

  const setField = (path) => (e) => {
    const value = e.target.value;
    setDraft((prev) => {
      const next = { ...prev };
      if (path.length === 1) {
        next[path[0]] = value;
      } else {
        next[path[0]] = { ...next[path[0]], [path[1]]: value };
      }
      return next;
    });
  };

  const handleSave = () => {
    onUpdateShop(draft);
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  return (
    <div className="space-y-5">
      <div>
        <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-2">Contact</p>
        <div className="grid grid-cols-2 gap-2.5">
          <input value={draft.phone} onChange={setField(["phone"])} placeholder="Primary phone"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          <input value={draft.phoneAlt} onChange={setField(["phoneAlt"])} placeholder="Secondary phone"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </div>
      </div>

      <div>
        <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-2">Bank transfer</p>
        <div className="space-y-2">
          <input value={draft.bank.bankName} onChange={setField(["bank", "bankName"])} placeholder="Bank name"
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          <input value={draft.bank.accountName} onChange={setField(["bank", "accountName"])} placeholder="Account name"
            className="w-full bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          <div className="grid grid-cols-2 gap-2.5">
            <input value={draft.bank.accountNumber} onChange={setField(["bank", "accountNumber"])} placeholder="Account number"
              className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] font-mono focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
            <input value={draft.bank.branch} onChange={setField(["bank", "branch"])} placeholder="Branch"
              className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          </div>
        </div>
      </div>

      <div>
        <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-2">Airtel Money</p>
        <div className="grid grid-cols-2 gap-2.5">
          <input value={draft.airtelMoney.name} onChange={setField(["airtelMoney", "name"])} placeholder="Registered name"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          <input value={draft.airtelMoney.number} onChange={setField(["airtelMoney", "number"])} placeholder="Number"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] font-mono focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </div>
      </div>

      <div>
        <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-2">TNM Mpamba</p>
        <div className="grid grid-cols-2 gap-2.5">
          <input value={draft.tnmMpamba.name} onChange={setField(["tnmMpamba", "name"])} placeholder="Registered name"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
          <input value={draft.tnmMpamba.number} onChange={setField(["tnmMpamba", "number"])} placeholder="Number"
            className="bg-[#0B1220] border border-[#22344F] rounded-md px-3 py-2 text-sm text-[#E8EEF5] font-mono focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]" />
        </div>
      </div>

      <button
        onClick={handleSave}
        className="w-full flex items-center justify-center gap-2 rounded-lg bg-[#F5A623] text-[#0B1220] font-medium text-sm py-2.5 hover:bg-[#FFB84D] transition-colors"
      >
        <Save size={14} /> {saved ? "Saved" : "Save payment details"}
      </button>
    </div>
  );

function AdminPanel({ listings, onApprove, onReject, onClose, shop, onUpdateShop }) {

  const pending = listings.filter((l) => l.status === "pending");
  const approved = listings.filter((l) => l.status === "approved" && !l.isShop);
  const totalCommissionPotential = approved.reduce((sum, l) => sum + l.price * COMMISSION_RATE, 0);

  return (
    <div className="max-w-2xl mx-auto px-4 py-6">
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="flex items-center gap-2 mb-1">
            <ShieldCheck size={16} className="text-[#F5A623]" />
            <h1 className="font-sans text-lg font-semibold text-[#E8EEF5]">Admin review</h1>
          </div>
          <p className="text-sm text-[#7C8BA0]">Approve seller listings and track commission</p>
        </div>
        <button onClick={onClose} className="text-[#7C8BA0] hover:text-[#E8EEF5] text-sm">
          Done
        </button>
      </div>

      <div className="grid grid-cols-2 gap-3 mb-3">
        <div className="rounded-lg bg-[#0F1B2D] border border-[#1C2C42] p-4">

        </div>
        <div className="rounded-lg bg-[#0F1B2D] border border-[#1C2C42] p-4">
          <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-1">Potential commission</p>
          <p className="font-mono text-2xl text-[#3DD6F5] font-semibold">{formatMWK(Math.round(totalCommissionPotential))}</p>
        </div>
      </div>

      <button
        onClick={() => setShowSettings((s) => !s)}

      >
        <span className="flex items-center gap-2 text-sm text-[#E8EEF5]">
          <Pencil size={14} className="text-[#F5A623]" /> Edit bank & mobile money details
        </span>
        <ChevronRight size={14} className={`text-[#7C8BA0] transition-transform ${showSettings ? "rotate-90" : ""}`} />
      </button>

      {showSettings && (
        <div className="rounded-lg bg-[#0B1220] border border-[#22344F] p-4 mb-6">
          <ShopSettingsEditor shop={shop} onUpdateShop={onUpdateShop} />
        </div>
      )}

      {pending.length === 0 ? (
        <div className="rounded-lg border border-dashed border-[#22344F] p-8 text-center mb-8">
          <p className="text-sm text-[#7C8BA0]">Nothing waiting on you. New seller submissions will show up here.</p>
        </div>
      ) : (
        <div className="space-y-3 mb-8">
          {pending.map((l) => (
            <div key={l.id} className="rounded-lg bg-[#0F1B2D] border border-[#1C2C42] p-4">
              <div className="flex items-start justify-between mb-2">
                <div>
                  <p className="text-sm font-medium text-[#E8EEF5]">{l.title}</p>
                  <p className="text-xs text-[#7C8BA0] mt-0.5">by {l.seller} · {l.category}</p>

                <p className="font-mono text-sm text-[#3DD6F5]">{formatMWK(l.price)}</p>
              </div>
              <p className="text-xs text-[#9FB3CC] mb-3">{l.desc}</p>
              <div className="flex gap-2">
                <button onClick={() => onApprove(l.id)}
                  className="flex-1 flex items-center justify-center gap-1.5 rounded-md bg-[#0E2A2E] border border-[#1C4A52] text-[#3DD6F5] text-xs font-medium py-2 hover:bg-[#123339] transition-colors">

                <button onClick={() => onReject(l.id)}
                  className="flex-1 flex items-center justify-center gap-1.5 rounded-md bg-[#2A1414] border border-[#4A1C1C] text-[#F56B5C] text-xs font-medium py-2 hover:bg-[#341818] transition-colors">
                  <X size={14} /> Decline
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <p className="font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] mb-3">Live seller listings</p>
      {approved.length === 0 ? (
        <p className="text-sm text-[#4D5C73]">None yet.</p>
      ) : (
        <div className="space-y-2">
          {approved.map((l) => (
            <div key={l.id} className="flex items-center justify-between rounded-md bg-[#0B1220] border border-[#1C2C42] px-3 py-2.5">
              <span className="text-sm text-[#C5D2E0]">{l.title}</span>
              <span className="font-mono text-xs text-[#7C8BA0]">+{formatMWK(Math.round(l.price * COMMISSION_RATE))} on sale</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Main App ----------
function App() {
  const [listings, setListings] = useState([]);
  const [shop, setShop] = useState(DEFAULT_SHOP);
  const [ready, setReady] = useState(false);
  const [view, setView] = useState("browse"); // browse | detail | submit | admin
  const [activeListing, setActiveListing] = useState(null);
  const [category, setCategory] = useState("All");
  const [query, setQuery] = useState("");
  const [toast, setToast] = useState(null);
  const [watching, setWatching] = useState(() => new Set());

  useEffect(() => {
    (async () => {
      const [l, s] = await Promise.all([loadListings(), loadShop()]);
      setListings(l);
      setShop(s);
      setReady(true);
    })();
  }, []);

  const toggleWatch = useCallback((id) => {
    setWatching((prev) => {
      const next = new Set(prev);
      if (next.has(id)) {
        next.delete(id);
        setToast("Removed from watching.");
      } else {
        next.add(id);
        setToast("Watching — you'll keep this in mind.");
      }
      return next;
    });
  }, []);

  useEffect(() => { if (ready) saveListings(listings); }, [listings, ready]);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  const visible = listings.filter((l) => l.status === "approved");
  const filtered = visible.filter((l) => {
    const matchCat = category === "All" || l.category === category;
    const matchQuery = l.title.toLowerCase().includes(query.toLowerCase());
    return matchCat && matchQuery;
  });

  const handleSubmit = useCallback((form) => {
    const newListing = {
      id: "lst_" + Date.now(),
      title: form.title,
      category: form.category,
      price: Number(form.price),
      seller: form.seller,
      isShop: false,
      status: "pending",
      condition: form.condition,
      desc: form.desc || "No additional details provided.",
      createdAt: Date.now(),
    };
    setListings((prev) => [newListing, ...prev]);
    setView("browse");
    setToast("Listing submitted — Skippers will review it shortly.");
  }, []);

  const handleApprove = (id) => {
    setListings((prev) => prev.map((l) => (l.id === id ? { ...l, status: "approved" } : l)));
    setToast("Listing approved and now live.");
  };
  const handleReject = (id) => {
    setListings((prev) => prev.map((l) => (l.id === id ? { ...l, status: "rejected" } : l)));
    setToast("Listing declined.");
  };

  const handleUpdateShop = useCallback((updatedShop) => {
    setShop(updatedShop);
    saveShop(updatedShop);
    setToast("Shop details updated.");
  }, []);

  const pendingCount = listings.filter((l) => l.status === "pending").length;

  if (!ready) {
    return (
      <div className="min-h-screen bg-[#0B1220] flex items-center justify-center">
        <p className="font-mono text-xs text-[#7C8BA0] uppercase tracking-wider">Loading…</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#0B1220] text-[#E8EEF5]" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        * { -webkit-tap-highlight-color: transparent; }
        :focus-visible { outline: 2px solid #3DD6F5; outline-offset: 2px; }
      `}</style>

      {/* Header */}
      <header className="border-b border-[#1C2C42] sticky top-0 z-10 bg-[#0B1220]/95 backdrop-blur-sm">
        <div className="max-w-5xl mx-auto px-4 py-3.5 flex items-center justify-between">
          <button onClick={() => { setView("browse"); }}>
            <Logo />
          </button>
          <button
            onClick={() => setView("admin")}
            className="relative flex items-center gap-1.5 font-mono text-[10px] uppercase tracking-wider text-[#7C8BA0] hover:text-[#F5A623] transition-colors px-2.5 py-1.5 rounded border border-[#1C2C42] hover:border-[#4A3C18]"
          >
            <ShieldCheck size={13} /> Admin
            {pendingCount > 0 && (
              <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-[#F5A623] text-[#0B1220] text-[9px] font-bold flex items-center justify-center">
                {pendingCount}
              </span>
            )}
          </button>
        </div>
      </header>

      {/* Shop strip */}
      {view === "browse" && (
        <div className="border-b border-[#1C2C42] bg-[#0F1B2D]">
          <div className="max-w-5xl mx-auto px-4 py-4 flex flex-wrap items-center gap-x-6 gap-y-2 text-xs text-[#9FB3CC]">
            <span className="flex items-center gap-1.5"><Store size={13} className="text-[#3DD6F5]" /> {shop.name}</span>
            <span className="flex items-center gap-1.5"><MapPin size={13} className="text-[#3DD6F5]" /> {shop.location}</span>
            <span className="flex items-center gap-1.5"><Clock size={13} className="text-[#3DD6F5]" /> {shop.hours}</span>
            <span className="flex items-center gap-3 ml-auto">
              <a href={`tel:${shop.phone.replace(/\s/g, "")}`} className="flex items-center gap-1.5 text-[#3DD6F5] hover:text-[#5FE0F8] font-medium">
                <Phone size={13} /> {shop.phone}
              </a>
              <a href={`tel:${shop.phoneAlt.replace(/\s/g, "")}`} className="flex items-center gap-1.5 text-[#3DD6F5] hover:text-[#5FE0F8] font-medium">
                / {shop.phoneAlt}
              </a>
            </span>
          </div>
        </div>
      )}

      <main className="pb-16">
        {view === "browse" && (
          <div className="max-w-5xl mx-auto px-4">
            <div className="py-5 flex flex-col gap-4">
              <div className="flex gap-3">
                <div className="relative flex-1">
                  <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#4D5C73]" />
                  <input
                    value={query}
                    onChange={(e) => setQuery(e.target.value)}
                    placeholder="Search phones, parts, repairs..."
                    className="w-full bg-[#0F1B2D] border border-[#1C2C42] rounded-lg pl-9 pr-3 py-2.5 text-sm text-[#E8EEF5] placeholder:text-[#4D5C73] focus:outline-none focus:ring-1 focus:ring-[#3DD6F5]"
                  />
                </div>
                <button
                  onClick={() => setView("submit")}
                  className="flex items-center gap-1.5 rounded-lg bg-[#F5A623]/20 border border-[#F5A623]/40 text-[#F5A623] text-sm font-medium px-4 py-2.5 hover:bg-[#F5A623]/30 transition-colors whitespace-nowrap"
                >
                  <Plus size={15} /> Sell something
                </button>
              </div>

              <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
                {CATEGORIES.map((c) => (
                  <button
                    key={c}
                    onClick={() => setCategory(c)}
                    className={`font-mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-md border whitespace-nowrap transition-colors ${
                      category === c
                        ? "bg-[#3DD6F5] text-[#0B1220] border-[#3DD6F5]"
                        : "bg-[#3DD6F5]/15 text-[#9FE0F5] border-[#3DD6F5]/30 hover:bg-[#3DD6F5]/25"
                    }`}
                  >
                    {c}
                  </button>
                ))}
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="rounded-lg border border-dashed border-[#22344F] p-12 text-center">
                <p className="text-sm text-[#7C8BA0]">No listings match that search yet.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 pb-8">
                {filtered.map((l) => (
                  <ListingCard key={l.id} listing={l} isWatching={watching.has(l.id)} onOpen={(item) => { setActiveListing(item); setView("detail"); }} />
                ))}
              </div>
            )}
          </div>
        )}

        {view === "detail" && activeListing && (
          <ListingDetail
            listing={activeListing}
            onBack={() => setView("browse")}
            isWatching={watching.has(activeListing.id)}
            onToggleWatch={toggleWatch}
            shop={shop}
          />
        )}

        {view === "submit" && (
          <SubmitListingForm onSubmit={handleSubmit} onCancel={() => setView("browse")} />
        )}

        {view === "admin" && (
          <AdminPanel
            listings={listings}
            onApprove={handleApprove}
            onReject={handleReject}
            onClose={() => setView("browse")}
            shop={shop}
            onUpdateShop={handleUpdateShop}
          />
        )}
      </main>

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#15233A] border border-[#3DD6F5]/40 text-[#E8EEF5] text-sm px-4 py-2.5 rounded-lg shadow-lg flex items-center gap-2 z-20">
          <Check size={14} className="text-[#3DD6F5]" /> {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
